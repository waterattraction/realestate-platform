# jiakubo.com — 房地产资产证券化平台
# 证书由 certbot 自动写入 ssl_certificate 路径

upstream realestate_backend {
    server 127.0.0.1:8000;
    keepalive 16;
}

# 裸 IP / 其他 Host：拒绝
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 80;
    listen [::]:80;
    server_name jiakubo.com www.jiakubo.com;

    client_max_body_size 50M;

    # certbot 验证路径（申请/续期证书时需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://jiakubo.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.jiakubo.com;

    ssl_certificate     /etc/letsencrypt/live/jiakubo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jiakubo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://jiakubo.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jiakubo.com;

    ssl_certificate     /etc/letsencrypt/live/jiakubo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jiakubo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # 数据导入接口：限流 + 基础认证（密码见 /etc/nginx/.htpasswd-ingestion）
    location /ingestion/ {
        auth_basic "Data Ingestion";
        auth_basic_user_file /etc/nginx/.htpasswd-ingestion;
        limit_req zone=realestate_ingestion burst=2 nodelay;
        proxy_pass http://realestate_backend;
        include /opt/realestate-platform/deploy/nginx/proxy_params.conf;
    }

    location / {
        proxy_pass http://realestate_backend;
        include /opt/realestate-platform/deploy/nginx/proxy_params.conf;
    }
}
