# jiakubo.com — 房地产资产证券化平台
# 证书由 certbot 自动写入 ssl_certificate 路径

upstream realestate_backend {
    server 127.0.0.1:8000;
    keepalive 16;
}

# 裸 IP / 其他 Host：拒绝
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 80;
    listen [::]:80;
    server_name jiakubo.com www.jiakubo.com;

    client_max_body_size 50M;

    # certbot 验证路径（申请/续期证书时需要）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://jiakubo.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.jiakubo.com;

    ssl_certificate     /etc/letsencrypt/live/jiakubo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jiakubo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://jiakubo.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name jiakubo.com;

    ssl_certificate     /etc/letsencrypt/live/jiakubo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jiakubo.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    # 资产数据导入写接口：限流（查看页 / 列表 data 不限流）
    location = /assetinfo/preview {
        limit_req zone=realestate_assetinfo burst=20 nodelay;
        proxy_pass http://realestate_backend;
        include /opt/realestate-platform/deploy/nginx/proxy_params.conf;
    }

    location = /assetinfo/import {
        limit_req zone=realestate_assetinfo burst=20 nodelay;
        proxy_pass http://realestate_backend;
        include /opt/realestate-platform/deploy/nginx/proxy_params.conf;
    }

    location = /assetinfo/pipeline {
        limit_req zone=realestate_assetinfo burst=20 nodelay;
        proxy_pass http://realestate_backend;
        include /opt/realestate-platform/deploy/nginx/proxy_params.conf;
    }

    # 资产情况相关页面与只读 data API：不限流
    # 鉴权统一走应用层 Cookie 登录（get_page_user / get_current_user），不再使用 HTTP Basic Auth。
    # /etc/nginx/.htpasswd-assetinfo 保留不删，便于将来个别管理接口需要时复用；当前站点不引用。
    location /assetinfo/ {
        proxy_pass http://realestate_backend;
        include /opt/realestate-platform/deploy/nginx/proxy_params.conf;
    }

    # 兼容旧 URL（过渡期）
    location = /ingestion/preview { return 301 /assetinfo/preview; }
    location = /ingestion/import { return 301 /assetinfo/import; }
    location = /ingestion/pipeline { return 301 /assetinfo/pipeline; }
    location /ingestion/ {
        rewrite ^/ingestion/(.*)$ /assetinfo/$1 permanent;
    }

    location / {
        proxy_pass http://realestate_backend;
        include /opt/realestate-platform/deploy/nginx/proxy_params.conf;
    }
}
