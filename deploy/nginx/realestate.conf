# 房地产资产证券化平台 — Nginx 反向代理（HTTP）
# 安装见文末注释

upstream realestate_backend {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # 有正式域名并启用 HTTPS 后，取消下行注释以强制跳转
    # return 301 https://$host$request_uri;

    client_max_body_size 50M;

    # 安全响应头（HTTP 阶段可先启用；HSTS 仅在 HTTPS 配置中开启）
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    location /ingestion/ {
        limit_req zone=realestate_ingestion burst=2 nodelay;
        proxy_pass http://realestate_backend;
        include /opt/realestate-platform/deploy/nginx/proxy_params.conf;
    }

    location / {
        proxy_pass http://realestate_backend;
        include /opt/realestate-platform/deploy/nginx/proxy_params.conf;
    }
}
