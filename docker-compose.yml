services:
  postgres:
    image: postgres:16
    container_name: realestate-postgres
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      POSTGRES_DB: realestate
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ChangeThisPassword123!
      PGTZ: Asia/Shanghai
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: realestate-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      TZ: Asia/Shanghai
      DATABASE_URL: postgresql://admin:ChangeThisPassword123!@postgres:5432/realestate 
      ASSETINFO_REPO_ROOT: /data/repo
      ASSET_UPLOAD_DIR: /data/uploads
      AMAP_API_KEY: ${AMAP_API_KEY:-}
    volumes:
      - .:/data/repo:ro
      - upload_data:/data/uploads
    depends_on:
      - postgres

volumes:
  postgres_data:
  upload_data:
